<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kainest - Asisten Keuangan & Pasangan</title>
    
    <!-- Open Graph / Link Preview Meta Tags -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Kainest - Asisten Keuangan & Pasangan" />
    <meta property="og:description" content="Kelola keuangan pribadi, catat transaksi otomatis via WhatsApp, dan pantau keuangan bersama pasangan Anda di satu tempat." />
    <!-- Idealnya gambar banner berukuran 1200x630px -->
    <meta property="og:image" content="/images/og.png" />
    <meta property="og:url" content="https://kainest.com" />

    <!-- Twitter Card Meta Tags -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Kainest - Asisten Keuangan & Pasangan" />
    <meta name="twitter:description" content="Kelola keuangan pribadi, catat transaksi otomatis via WhatsApp, dan pantau keuangan bersama pasangan Anda di satu tempat." />
    <meta name="twitter:image" content="/images/og.png" />
  </head>
  <body
    class="font-inter antialiased bg-gray-100 dark:bg-gray-900 text-gray-600 dark:text-gray-400"
  >
    <script>
      if (localStorage.getItem("sidebar-expanded") == "true") {
        document.querySelector("body").classList.add("sidebar-expanded");
      } else {
        document.querySelector("body").classList.remove("sidebar-expanded");
      }
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
